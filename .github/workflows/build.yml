name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S src -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Build Debug
        run: cmake --build build --config Debug

      - name: Upload Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenSteamTool-Release
          path: |
            build/Release/OpenSteamTool.dll
            build/Release/dwmapi.dll

      - name: Upload Debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenSteamTool-Debug
          path: |
            build/Debug/OpenSteamTool.dll
            build/Debug/dwmapi.dll
